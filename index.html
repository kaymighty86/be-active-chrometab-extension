<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./style.css" rel="stylesheet" type="text/css">
    <script src="./app.js" type="text/Javascript" defer></script>
    <script src="./tasksTracker.js" type="text/Javascript" defer></script>
    <title>New Tab</title>
</head>
<body>
    <section id="wallpaper_section">
        <span id="wallpaper" class="wallpaper"></span>
        <div id="black_cover"></div>
    </section>
    <section id="content_section">
        <section class="partition left">
            <div>
                <div id="daily_task" class="card">
                    <div id="tasks_summary">
                        <img src="./assets/images/icons/checklist.svg" alt="tasks"/>
                        <ul id="tasks_summary_list">
                        </ul>
                    </div>
                    <div id="inner_content">
                        <div id="inner_content_header">
                            <img src="./assets/images/icons/checklist.svg" alt="tasks"/>
                            <h3>What would you like to achieve today?</h3>
                        </div>
                        <h4>Tasks reset everyday 😛 No procrastination 😒</h4>
                        <form id="task_input_form">
                            <input id="task_input" type="text" name = "task" maxlength="60" placeholder="I will..." title="Type your task here" required/>
                            <button type="submit" id="task_submit_btn" title="Add task">+</button>
                        </form>
                        <ul id="tasks">
                        </ul>
                    </div>
                </div>
            </div>
        </section>
        <section class="partition middle">
            <div id="searchbar_container">
                <a href="https://google.com" class="link_icon" title="Open Google Home Page">
                    <img src="./assets/images/logos/search.png"/>
                </a>
                <form id="search_form">
                    <input name="search_text" type="text" placeholder="Search Google" title="Search Google" required/>
                    <button type="submit" title="Go"><img src="./assets/images/icons/search_icon_white.svg" width="20px"/></button>
                </form>
            </div>
            <div id="date_time">
                <p id="date">22 Feb 2026</p>
                <p id="time">01:36</p>
                <div id="message_body">
                    <p class="first_message">Hello Kay! 😃</p>
                </div>
            </div>
        </section>
        <section class="partition right">
            <div id="quick_nav">
                <a href="https://github.com" class="link_icon slower-2">
                    <img src="./assets/images/logos/github.png"/>
                </a>
                <a href="https://mail.google.com" class="link_icon slower-3">
                    <img src="./assets/images/logos/gmail.png"/>
                </a>
                <a href="https://youtube.com" class="link_icon slower-1">
                    <img src="./assets/images/logos/youtube.png"/>
                </a>
                <a href="https://kayswebs.ng" class="link_icon slower-2">
                    <img src="./assets/images/logos/my personal website logo.png"/>
                </a>
            </div>
        </section>
    </section>
</body>
</html>
